# Source of truth for non-secret, non-dashboard-owned config.
# Merged into /data/.hermes/config.yaml on every container boot by
# start.sh + merge_config.py. Dashboard owns model.default, `hermes model`
# (or /app/codex_login.py) owns model.provider — both are preserved
# from the existing file across merges.
terminal:
  backend: "local"
  timeout: 60
  cwd: "/tmp"

agent:
  max_iterations: 50

data_dir: "/data/.hermes"

# Graph MCP server. Launches a stdio-based FastMCP subprocess inside the
# container; the server wraps Neo4j with five read-only Cypher tools so
# Hermes can ask "what do I know about X" during reasoning. Gated on
# NEO4J_URI being set (interpolated at runtime by Hermes' own loader).
mcp_servers:
  graph:
    command: "python"
    args: ["/app/graph-mcp/server.py"]
    env:
      NEO4J_URI: "${NEO4J_URI}"
      NEO4J_USER: "${NEO4J_USER}"
      NEO4J_PASSWORD: "${NEO4J_PASSWORD}"
    timeout: 30

  # MS365 Outlook Mail MCP. Delegated auth; the token cache at
  # /data/.hermes/ms365_tokens.json is seeded once per install via
  # scripts/ms365_login.py (device-code flow, locally) and then refreshed
  # silently by MSAL. Gated to Ari by SOUL.md (Vika is explicitly blocked
  # from MS365 tools). client_secret is intentionally NOT injected: the
  # public-client device-code flow does not use it.
  ms365:
    command: "python"
    args: ["/app/ms365-mcp/server.py"]
    env:
      MS365_CLIENT_ID: "${MS365_MCP_CLIENT_ID}"
      MS365_TENANT_ID: "${MS365_MCP_TENANT_ID}"
      HERMES_HOME: "/data/.hermes"
    timeout: 30
    tools:
      include: [list_recent_emails, read_email, search_emails, send_email]

  # M-Files (Birnbaum Group Immobilien cloudvault). Read + workflow-state-push
  # tools for Vorgaenge (Mietermeldungen, Angebote, Sanierungen). Ported from
  # the local mfiles-immobilien MCP (30+ tools); only the Vorgang/Property
  # subset is exposed via the include list - the finance tools (metrics,
  # refinancing, dscr) stay in the code but are not freigegeben until Ari
  # needs them. Gated in SOUL to Ari only.
  mfiles:
    command: "python"
    args: ["/app/mfiles-mcp/server.py"]
    env:
      MFILES_SERVER_URL: "${MFILES_SERVER_URL}"
      MFILES_VAULT_GUID: "${MFILES_VAULT_GUID}"
      MFILES_USERNAME: "${MFILES_USERNAME}"
      MFILES_PASSWORD: "${MFILES_PASSWORD}"
      PYTHONPATH: "/app/mfiles-mcp"
    timeout: 45
    tools:
      include:
        - mfiles_list_portfolios
        - mfiles_get_portfolio_properties
        - mfiles_list_vorgaenge
        - mfiles_get_vorgang_details
        - mfiles_get_vorgang_documents
        - mfiles_vorgaenge_recap_bundle
        - mfiles_download_doc
        - mfiles_set_vorgang_status
        - mfiles_set_angebot_status
        - mfiles_set_sanierung_status
        - mfiles_add_vorgang_comment
        - mfiles_vorgaenge_decide_batch
        - mfiles_search
        - mfiles_get_view_items

